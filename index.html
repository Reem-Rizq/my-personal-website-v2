        <section id="experience">            
                <h1 data-ar="خبرتي" data-en="My Experience"></h1>
                <article class="container">
                    <p data-ar="وظفت جميع مهاراتي التقنية السابقة في إنشاء هذا الموقع، واعتمدت على المصادر المتاحة على يوتيوب ومنصة سطر التعليمية وأدلة w3schools لأتعلم المزيد وأتجاوز المشاكل التي واجهتني، وابتكرت احيانا طرقا التفافية خاصة لحل المشكلة حين لم تنجح الحلول المقترحة في المصادر.
 من المشاكل التي واجهتني على سبيل المثال:
- ترميز حروف كلا اللغتين العربية والانجليزية.
- مشاكل عرض العناصر والإخراج البصري (الكثير منها).
- أعطال ملفات الصور والخطوط.

ومن المهارات التي اكتسبتها ايضا على سبيل المثال:
- تحسين الكود لمحركات البحث وقارئات الشاشة (المهمة لإمكانية وصول ذوي الاحتياجات الخاصة).
- ربط لغات البرمجة المختلفة معا (HTML + CSS + Javascript).
- استخدام واجهة مطوري المواقع على المتصفح.

وبشكل عام، كان أكبر تحديَين واجهتهما في العمل على هذا الموقع هما الإخراج البصري وإضافة الترجمة للغتين العربية والانجليزية؛ ولكم الحكم على طريقتي في التعامل معهما.

للاطلاع على محاولاتي القديمة مع سكراتش يمكنكم زيارة:" data-en="I applied all my technical skills to create this website relying on available resources on YouTube, Satr educational platform, and w3schools guides to learn more and solve the problems I faced. Sometimes, I even created custom workarounds when the suggested ones didn't work.

Some of these problems I faced included:
- Character encoding  (UTF-8) for both Arabic and English.
- Layout, display, and visual presentation issues (lots of them!).
- Broken image and font files.

Some of the new skills I learned included:
- Optimizing code for search engines (SEO) and screen readers (which is important for accessibility)
- Integrating different programming languages (HTML + CSS + JavaScript)
- Using browser developer tools (DevTools)

Overall, the two biggest challenges I faced working on this website were visual presentation and adding Arabic and English translations; but I'll let you be the judge of how I handled them.

To see my early experiments on Scratch, you can visit:"></p>
                <h5><a href="https://scratch.mit.edu/users/Reem_Jr27/">Scratch.</a></h5>
            </article>
        </section>
